<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <script src="index.js"></script>
    </head>
    <body>
        <div class="containerContent">
            <div class="TeamDiv" id="HomeTeamDiv">
                <p class="TeamTitle" id="HomeTitle">Home</p>

                <div class="PointsAndFoulDiv">
                    <p class="PointsP" id="HomePoints">0</p>
                    <p class="FoulP" id="HomeFouls">0</p>
                </div>
                
                
                <div class="ButtonsDiv">
                    <div class="AddPointsDiv">
                        <button onclick="AddToPoints(1,'home')">+1</button>
                        <button onclick="AddToPoints(2,'home')">+2</button>
                        <button onclick="AddToPoints(3,'home')">+3</button>
                    </div>
                    <div class="FoulButtonDiv">
                        <button onclick="AddToFouls('home')">Foul</button>
                    </div>
                </div>
            </div>

                <!-- game data goes here -->
            
                
            <div class="TeamDiv" id="GuestTeamDiv">
                <p class="TeamTitle" id="GuestTitle">Guest</p>

                <div class="PointsAndFoulDiv">
                    <p class="PointsP" id="GuestPoints">0</p>
                    <p class="FoulP" id="GuestFouls">0</p>
                </div>
                                
                <div class="ButtonsDiv">
                    <div class="AddPointsDiv">
                        <button onclick="AddToPoints(1,'guest')">+1</button>
                        <button onclick="AddToPoints(2,'guest')">+2</button>
                        <button onclick="AddToPoints(3,'guest')">+3</button>
                    </div>
                    <div class="FoulButtonDiv">
                        <button onclick="AddToFouls('guest')">Foul</button>
                    </div>
                </div>
            </div>

            
        </div>
    </body>
</html>
