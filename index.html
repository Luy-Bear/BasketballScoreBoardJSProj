<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
         <!-- Basketball Court Background -->
        <div class="court">
            <div class="grain" style="top:15%"></div>
            <div class="grain" style="top:30%"></div>
            <div class="grain" style="top:45%"></div>
            <div class="grain" style="top:60%"></div>
            <div class="grain" style="top:75%"></div>
            <div class="grain" style="top:90%"></div>

            <div class="court-centre-line"></div>
            <div class="court-centre-circle"></div>
            <div class="court-centre-dot"></div>

            <div class="court-paint court-paint-left"></div>
            <div class="court-ft-circle court-ft-circle-left"></div>
            <div class="court-backboard court-backboard-left"></div>
            <div class="court-basket court-basket-left"></div>
            <div class="court-restricted-arc court-restricted-arc-left"></div>
            <div class="court-three-point court-three-point-left"></div>
            <div class="court-corner-line court-corner-left-top"></div>
            <div class="court-corner-line court-corner-left-bottom"></div>

            <div class="court-paint court-paint-right"></div>
            <div class="court-ft-circle court-ft-circle-right"></div>
            <div class="court-backboard court-backboard-right"></div>
            <div class="court-basket court-basket-right"></div>
            <div class="court-restricted-arc court-restricted-arc-right"></div>
            <div class="court-three-point court-three-point-right"></div>
            <div class="court-corner-line court-corner-right-top"></div>
            <div class="court-corner-line court-corner-right-bottom"></div>
        </div>

        <div class="containerContent">
            <div class="TeamDiv" id="HomeTeamDiv">
                <p class="TeamTitle" id="HomeTitle">Home</p>

                <div class="PointsAndFoulDiv">
                    <p class="PointsP" id="HomePoints">0</p>
                    <p class="FoulP" id="HomeFouls">0</p>
                </div>
                
                
                <div class="ButtonsDiv">
                    <div class="AddPointsDiv">
                        <button onclick="" id="addOneHome">+1</button>
                        <button onclick=""  id="addTwoHome">+2</button>
                        <button onclick="" id="addThreeHome">+3</button>
                    </div>
                    <div class="FoulButtonDiv">
                        <button id = "HomeFoulbtn" onclick="">Foul</button>
                    </div>
                </div>
            </div>

                <!-- game data goes here -->
            <div class="GameInfoDiv" id="GameInfoDiv">
                <!-- timer -->
                <p class="GameInfoP" id="Timer">00:00</p>
                <!-- period -->
                <p class="GameInfoP" id="Period">1/4</p>
                <!-- "winning" instead of possesion (two lights either side) -->
                <div class="GameInfoP" id="WinningMarkerDiv">
                    <p class="MarkWinEl" id="HomeLight">()</p>
                    <p class="MarkWinEl" id="WinningMarkerPara">Winning</p>
                    <p class="MarkWinEl" id="GuestLight">()</p>
                </div>
                <div id="GameInfoButtonDivs">
                    <button onclick="resetGame()">Reset Game</button>
                    <button onclick="startGame()" id="StartPauseBtn">Start</button>
                </div>
            </div>
                
            <div class="TeamDiv" id="GuestTeamDiv">
                <p class="TeamTitle" id="GuestTitle">Guest</p>
                <div class="PointsAndFoulDiv">
                    <p class="PointsP" id="GuestPoints">0</p>
                    <p class="FoulP" id="GuestFouls">0</p>
                </div>
                                
                <div class="ButtonsDiv">
                    <div class="AddPointsDiv">
                        <button onclick="" id="addOneGuest">+1</button>
                        <button onclick="" id="addTwoGuest">+2</button>
                        <button onclick="" id="addThreeGuest">+3</button>
                    </div>
                    <div class="FoulButtonDiv">
                        <button id = "GuestFoulbtn" onclick="">Foul</button>
                    </div>
                </div>
            </div>

            
        </div>
        
    <script src="index.js"></script>
    </body>
</html>
